name: Daily DB Backup

# Runs every day at 7:00 UTC = 2:00 AM Central / 3:00 AM Eastern.
# Dumps the entire production Postgres (Supabase) and uploads as a
# 90-day-retention GitHub Actions artifact. Independent of Supabase's
# own backup retention, so a Supabase outage / account issue / accidental
# wipe doesn't take all our data.
#
# Manual trigger: gh workflow run daily-db-backup.yml --repo Vyntechs/VynTechs_Auto
# View runs:      gh run list --workflow=daily-db-backup.yml --repo Vyntechs/VynTechs_Auto
# Download dump:  gh run download <run-id> --repo Vyntechs/VynTechs_Auto
#
# Restore steps live in docs/RESTORE.md.
#
# SECURITY NOTE: This workflow only consumes `secrets.BACKUP_DATABASE_URL`
# (a repo-admin-set secret) and `github.run_id` (a numeric ID generated by
# GitHub itself). No user-controlled fields (issue titles, PR bodies,
# commit messages, branch names, etc.) are read or interpolated, so the
# common workflow-injection attack surface is not present here.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  # Releases write is needed to publish backup artifacts as release assets
  # (instead of Actions artifacts, which share a 500 MB account-wide quota
  # with other repos on GitHub Free). Releases have no equivalent quota.
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUN_ID: ${{ github.run_id }}

    steps:
      - name: Install Postgres 17 client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          # Ubuntu 24.04 ships pg_dump v16 in /usr/bin which wins on PATH;
          # call v17 explicitly to match the Supabase 17 server version.
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump database
        env:
          # Session-mode pooler URL (port 5432, NOT 6543) — the runtime app
          # uses transaction-mode pooler which doesn't support pg_dump, and
          # the direct db.<ref>.supabase.co URL is IPv6-only on free plan.
          # Session pooler is IPv4 and supports the full pg_dump protocol.
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::BACKUP_DATABASE_URL secret is not set on the repo."
            exit 1
          fi
          mkdir -p backups
          DATE=$(date -u +%Y-%m-%d-%H%M)
          OUT="backups/vyntechs-${DATE}.sql.gz"
          /usr/lib/postgresql/17/bin/pg_dump \
            --no-owner --no-acl \
            --clean --if-exists \
            --quote-all-identifiers \
            "$DATABASE_URL" | gzip -9 > "$OUT"
          ls -lh "$OUT"
          SIZE=$(stat -c%s "$OUT")
          if [ "$SIZE" -lt 1024 ]; then
            echo "::error::Dump file is only ${SIZE} bytes — likely a connection failure."
            exit 1
          fi
          echo "Dump size: ${SIZE} bytes"

      - name: Publish backup as GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d-%H%M)
          TAG="backup-$DATE"
          NOTES="Automated daily Postgres dump. Restore steps in docs/RESTORE.md."
          gh release create "$TAG" backups/*.sql.gz \
            --repo "$REPO" \
            --title "DB Backup $DATE UTC" \
            --notes "$NOTES"

      - name: Prune backup releases older than 90 days
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '90 days ago' +%s)
          gh release list --repo "$REPO" --limit 200 --json tagName,createdAt \
            | jq -r --argjson cutoff "$CUTOFF" '
                .[]
                | select(.tagName | startswith("backup-"))
                | select((.createdAt | sub("\\..*Z"; "Z") | fromdateiso8601) < $cutoff)
                | .tagName
              ' \
            | while read -r TAG; do
                echo "Pruning old backup release: $TAG"
                gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
              done
