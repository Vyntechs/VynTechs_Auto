<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connection needed · Vyntechs</title>
    <style>
      :root {
        color-scheme: light;
        --page: oklch(98.5% 0.008 80);
        --surface: oklch(96% 0.01 80);
        --ink: oklch(18% 0.01 55);
        --muted: oklch(50% 0.014 70);
        --rule: oklch(86% 0.013 80);
        --signal: oklch(50% 0.18 248);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        padding: 24px;
        display: grid;
        place-items: center;
        background: var(--page);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
        padding: clamp(28px, 7vw, 48px);
        border: 1px solid var(--rule);
        border-top: 3px solid var(--signal);
        border-radius: 4px;
        background: var(--surface);
      }

      .brand {
        margin: 0 0 64px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 12ch;
        margin: 0;
        font-size: clamp(2.25rem, 9vw, 4rem);
        font-weight: 650;
        letter-spacing: -0.04em;
        line-height: 0.98;
      }

      .instruction {
        margin: 28px 0 8px;
        font-size: 1rem;
        font-weight: 650;
      }

      .detail {
        max-width: 42ch;
        margin: 0;
        color: var(--muted);
        font-size: 0.9375rem;
        line-height: 1.6;
      }

      a {
        min-height: 44px;
        margin-top: 36px;
        padding: 0 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 3px;
        background: var(--signal);
        color: var(--page);
        font-size: 0.9375rem;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid var(--ink);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">Vyntechs</p>
      <h1>Connection needed</h1>
      <p class="instruction">Reconnect to continue</p>
      <p class="detail">Signed-in shop pages are not stored for offline use. Check your connection, then return to Today.</p>
      <a href="/today">Return to Today</a>
    </main>
  </body>
</html>
